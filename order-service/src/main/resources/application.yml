server:
  port: 8081

spring:
  application:
    name: order-service
  config:
    import: optional:nacos:order-service.yml

  datasource:
    url: jdbc:mysql://119.29.107.50:3306/demo?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect

  cloud:
    nacos:
      discovery:
        server-addr: 119.29.107.50:8848
        register-enabled: true
    sentinel:
      eager: true
      transport:
        dashboard: 119.29.107.50:8858
        port: 8719
feign:
  sentinel:
    enabled: true              # ★ Sentinel 接管 Feign，fallbackFactory 才能生效

spring.cloud.openfeign.client.config.default:
  connectTimeout: 5000
  readTimeout: 10000

# === 定时任务模拟故障率（0.0~1.0，默认 0.3） ===
# 设为 1.0 可以每次触发都失败，方便测试重试+告警全流程
task:
  failure:
    rate: 0.3  # 30% 概率模拟故障，测试完可改为 0 关闭

# === 企业微信机器人 Webhook ===
wecom:
  webhook:
    url: https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=65795771-f71d-4942-9b48-e0518156dcd8

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: order-service
