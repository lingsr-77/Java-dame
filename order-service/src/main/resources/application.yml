server:
  port: 8081

spring:
  application:
    name: order-service
  config:
    import: optional:nacos:order-service.yml

  # === 数据库 ===
  datasource:
    url: jdbc:mysql://119.29.107.50:3306/demo?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  cloud:
    nacos:
      discovery:
        server-addr: 119.29.107.50:8848
        register-enabled: true

    # === Sentinel 配置 ===
    sentinel:
      eager: true                       # 启动时初始化（不等第一次请求）
      transport:
        dashboard: 119.29.107.50:8858       # Sentinel 控制台地址
        port: 8719                      # 与 Dashboard 通信的本地端口
      # 注意：生产环境应该把 Sentinel 规则存到 Nacos 配置中心，
      # 这样规则不会因为服务重启而丢失。
      # datasource:
      #   ds1:
      #     nacos:
      #       server-addr: 119.29.107.50:8848
      #       data-id: order-service-sentinel-rules
      #       group-id: DEFAULT_GROUP
      #       data-type: json
      #       rule-type: flow

# === Feign 超时配置 ===
# 默认 Feign 超时是 1 秒（connect） + 1 秒（read），
# 学习环境可以调长一点，方便调试。
spring.cloud.openfeign.client.config.default:
  connectTimeout: 5000   # 连接超时 5 秒
  readTimeout: 10000     # 读取超时 10 秒

# === Actuator 指标暴露 ===
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: order-service
