server:
  port: 8081

spring:
  application:
    name: order-service
  config:
    import: optional:nacos:order-service.yml

  datasource:
    url: jdbc:mysql://119.29.107.50:3306/demo?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect

  cloud:
    nacos:
      discovery:
        server-addr: 119.29.107.50:8848
        register-enabled: true
    sentinel:
      eager: true
      transport:
        dashboard: 119.29.107.50:8858
        port: 8719
feign:
  sentinel:
    enabled: true              # ★ Sentinel 接管 Feign，fallbackFactory 才能生效

spring.cloud.openfeign.client.config.default:
  connectTimeout: 5000
  readTimeout: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: order-service
