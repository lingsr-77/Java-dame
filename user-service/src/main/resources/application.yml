server:
  port: 8082

spring:
  application:
    name: user-service
  config:
    import: optional:nacos:user-service.yml

  datasource:
    url: jdbc:mysql://119.29.107.50:3306/demo?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect

  cloud:
    nacos:
      discovery:
        server-addr: 119.29.107.50:8848
        register-enabled: true
    sentinel:
      eager: true
      transport:
        dashboard: 119.29.107.50:8858
        port: 8719

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: user-service
