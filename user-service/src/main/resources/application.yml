# ============================================
# application.yml —— 应用配置
# ============================================
# 加载顺序在 bootstrap.yml 之后。
# 应用的核心配置都在这里：端口、数据库、Sentinel 等。

server:
  port: 8082               # 每个微服务用不同端口，避免冲突

spring:
  application:
    name: user-service
  config:
    import: optional:nacos:user-service.yml

  # === 数据库配置 ===
  # 学习阶段 order-service 和 user-service 共享一个 MySQL 实例。
  # 实际生产环境中，每个微服务应该有独立的数据库。
  datasource:
    url: jdbc:mysql://119.29.107.50:3306/demo?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update     # 自动建表/更新表结构（学习用，生产应该用 Flyway）
    show-sql: false        # 设为 true 可以看到 Hibernate 生成的 SQL

  cloud:
    nacos:
      discovery:
        server-addr: 119.29.107.50:8848
        # Spring Cloud LoadBalancer 从 Nacos 拿到实例列表后，
        # 默认用轮询策略选择调用哪个实例。
        register-enabled: true   # 启动时注册到 Nacos

    sentinel:
      # eager: true 表示启动就初始化 Sentinel，而不是等到第一次请求才初始化。
      # 不设这个，Sentinel Dashboard 里要发一次请求才能看到服务。
      eager: true
      transport:
        dashboard: 119.29.107.50:8858   # Sentinel Dashboard 地址
        port: 8719                  # Sentinel 客户端通信端口

# === Actuator 配置 ===
# 暴露端点给 Prometheus 采集指标数据。
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: user-service   # Prometheus 指标的 application 标签
