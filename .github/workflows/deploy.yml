name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 远程触发部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/app
            git pull origin master
            mvn clean package -DskipTests -q
            sudo pkill -f "demo-0.0.1-SNAPSHOT" || true
            sleep 2
            nohup java -jar target/demo-0.0.1-SNAPSHOT.jar > /home/ubuntu/app.log 2>&1 &
            disown
            sleep 3
            curl http://localhost:8080/api/hello
