name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 远程触发部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/app
            git pull origin master
            mvn clean package -DskipTests -q
            sudo systemctl restart java-demo
            sleep 5
            curl --retry 3 --retry-delay 2 http://localhost:8080/api/hello
